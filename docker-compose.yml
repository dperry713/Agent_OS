version: '3.9'

services:
  api:
    build: .
    # gVisor Enforcment (requires runsc on host)
    runtime: runsc
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535
    # Immutable runtime
    read_only: true
    tmpfs:
      - /tmp:size=100M
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/agent_os
      - VAULT_ADDR=http://openbao:8200
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      - VALKEY_URL=redis://valkey:6379/0
      - RABBITMQ_URL=pyamqp://${RABBIT_USER}:${RABBIT_PASS}@rabbitmq:5672//
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
    networks:
      - agent_net

  openbao:
    image: openbao/openbao:latest
    command: ["server", "-config=/vault/config/config.hcl"]
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - IPC_LOCK
    volumes:
      - ./vault/config:/vault/config:ro
      - vault_data:/vault/file
    networks:
      - agent_net

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBIT_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBIT_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent_net

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=agent_os
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agent_net
    volumes:
      - postgres_data:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:7.2
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - agent_net

networks:
  agent_net:
    driver: bridge
    enable_ipv6: false

volumes:
  postgres_data:
  vault_data:
