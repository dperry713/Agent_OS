apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-os-worker
  labels:
    app: agent-os
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-os
      component: worker
  template:
    metadata:
      labels:
        app: agent-os
        component: worker
      annotations:
        # AppArmor profile for gVisor
        container.apparmor.security.beta.kubernetes.io/worker: runtime/default
    spec:
      runtimeClassName: gvisor
      # Pod-level security context
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: worker
        image: agent-os:latest
        command: ["celery", "-A", "app.kernel.celery_app", "worker", "--loglevel=info", "--pool=threads", "--concurrency=10"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agent-os-secrets
              key: database-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: agent-os-secrets
              key: rabbitmq-url
        - name: VALKEY_URL
          valueFrom:
            secretKeyRef:
              name: agent-os-secrets
              key: valkey-url
        - name: VAULT_ADDR
          value: "http://openbao.default.svc.cluster.local:8200"
        - name: VAULT_ROLE_ID
          valueFrom:
            secretKeyRef:
              name: agent-os-secrets
              key: vault-role-id
        - name: VAULT_SECRET_ID
          valueFrom:
            secretKeyRef:
              name: agent-os-secrets
              key: vault-secret-id
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          limits:
            cpu: "2"
            memory: "2Gi"
          requests:
            cpu: "1"
            memory: "1Gi"
      volumes:
      - name: tmp
        emptyDir: {}
