apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-os-worker
  labels:
    app: agent-os
    component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-os
      component: worker
  template:
    metadata:
      labels:
        app: agent-os
        component: worker
      annotations:
        # Optimization for gVisor (if using certain CSI drivers)
        container.apparmor.security.beta.kubernetes.io/worker: runtime/default
    spec:
      runtimeClassName: gvisor
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: worker
        image: agent-os:latest
        command: ["celery", "-A", "app.kernel.celery_app", "worker", "--loglevel=info"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true # Enforce immutable runtime
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: agent-os-secrets
              key: database-url
        - name: RABBITMQ_URL
          valueFrom:
            secretKeyRef:
              name: agent-os-secrets
              key: rabbitmq-url
        - name: VALKEY_URL
          valueFrom:
            secretKeyRef:
              name: agent-os-secrets
              key: valkey-url
        - name: VAULT_ADDR
          value: "http://openbao.default.svc.cluster.local:8200"
        - name: VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: agent-os-secrets
              key: vault-token
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
      volumes:
      - name: tmp
        emptyDir: {}
